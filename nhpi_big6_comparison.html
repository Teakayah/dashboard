<!DOCTYPE html>
<html lang="en">
<head>
  <!-- responsive-inject-v4 -->
  <style>
    @media (min-width: 769px) {
      html, body { height: 100vh; overflow: hidden; margin: 0; padding: 0; }
      body { max-width: 1200px; margin: 0 auto; display: flex; flex-direction: column; padding: 12px 24px !important; box-sizing: border-box; }
      #app { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
      .card { flex: 1; min-height: 0; padding: 10px 20px !important; margin-bottom: 8px !important; display: flex; flex-direction: column; overflow: hidden; }
      .chart-wrap, .chart-sm { flex: 1; min-height: 0; height: auto !important; position: relative; }
      .chart-wrap canvas, .chart-sm canvas { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
      .grid2 { flex: 1.2; min-height: 0; gap: 8px !important; margin-bottom: 4px !important; display: flex !important; }
      .grid2 > .card { flex: 1; margin-bottom: 0 !important; }
      .stats-grid { margin-bottom: 8px !important; gap: 6px !important; flex-shrink: 0; }
      .stat { padding: 6px !important; }
      .stat-val { font-size: 1.1rem !important; }

      h1 { font-size: 1.1rem !important; margin-bottom: 0 !important; }
      .subtitle { margin-bottom: 4px !important; font-size: 0.72rem !important; }
      .notice { padding: 4px 10px !important; margin-bottom: 6px !important; font-size: 0.7rem !important; }
      h2 { font-size: 0.8rem !important; margin-bottom: 4px !important; }
      .controls { margin-bottom: 4px !important; }
      .annotation { margin-top: 2px !important; font-size: 0.65rem !important; }
    }
  </style>
  <script>
    (function () {
      if (window.innerWidth < 769) return;
      Object.defineProperty(window, 'Chart', {
        configurable: true,
        set: function (C) {
          Object.defineProperty(window, 'Chart', { configurable: true, writable: true, value: C });
          C.defaults.maintainAspectRatio = false;
        }
      });
    })();
  </script>
  <!-- /responsive-inject -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHPI — Big-6 City Comparison (Vancouver · Toronto · Montréal · Edmonton · Calgary · Ottawa)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" integrity="sha384-bs/nf9FbdNouRbMiFcrcZfLXYPKiPaGVGplVbv7dLGECccEXDW+S3zjqSKR5ZEaD" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js" integrity="sha384-y49Zu59jZHJL/PLKgZPv3k2WI9c0Yp3pWB76V8OBVCb0QBKS8l4Ff3YslzHVX76Y" crossorigin="anonymous"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh;padding:24px}
  h1{font-size:1.35rem;font-weight:700;color:#fff;margin-bottom:4px}
  .subtitle{font-size:.82rem;color:#888;margin-bottom:8px}
  .notice{font-size:.77rem;color:#f59e0b;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);border-radius:6px;padding:8px 12px;margin-bottom:18px}
  .card{background:#1a1d27;border-radius:12px;padding:22px;margin-bottom:16px;border:1px solid #2a2d3a}
  h2{font-size:.92rem;font-weight:600;color:#ccc;margin-bottom:12px}
  .controls{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
  .controls label{font-size:.75rem;color:#666;margin-right:2px}
  button{padding:5px 13px;border-radius:6px;border:1px solid #3a3d4a;background:#252830;color:#ccc;font-size:.77rem;cursor:pointer;transition:all .15s}
  button:hover{background:#303445;color:#fff}
  button.active{background:#3b5bdb;border-color:#3b5bdb;color:#fff}
  .chart-wrap{position:relative;height:400px}
  .chart-sm{position:relative;height:280px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
  .stat{background:#1a1d27;border-radius:8px;padding:13px;border:1px solid #2a2d3a}
  .stat-name{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:#666;margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .stat-val{font-size:1.3rem;font-weight:700;color:#fff}
  .stat-sub{font-size:.72rem;color:#888;margin-top:2px}
  .stat-yoy{font-size:.8rem;font-weight:600;margin-top:4px}
  .pos{color:#4ade80}.neg{color:#f87171}
  .annotation{font-size:.74rem;color:#555;margin-top:8px}
  @media(max-width:680px){.grid2{grid-template-columns:1fr}}
</style>

<body>
<!-- back-link-inject --><div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:6px 0 2px;font-size:0.78rem;"><a href="https://teakayah.github.io/dashboard/" style="color:#4f8ef7;text-decoration:none;font-weight:600;">&#8592; DataDashboard</a></div>
<h1>NHPI — Big-6 City Comparison</h1>
<p class="subtitle">Statistics Canada · Table 18-10-0205-01 · Base: December 2016 = 100</p>

<div id="app"></div>
<script>
const RAW = {}; // Injected by Python pipeline

function toMap(records){ const m={}; (records||[]).forEach(r=>m[r.date]=r.value); return m; }
function getVals(map,dates){ return dates.map(d=>map[d]??null); }
function yoy(map,dates){
  return dates.map((d,i)=>{
    if(i<12) return null;
    const c=map[d], p=map[dates[i-12]];
    return (c&&p) ? +((c-p)/p*100).toFixed(2) : null;
  });
}
function rebase(map,dates,baseDate){
  const b=map[baseDate];
  if(!b) return dates.map(()=>null);
  return dates.map(d=>{ const v=map[d]; return v?+(v/b*100).toFixed(2):null; });
}
const TT={ backgroundColor:'#1e2130',borderColor:'#3a3d4a',borderWidth:1,titleColor:'#fff',bodyColor:'#ccc' };
const SX={ ticks:{color:'#666',maxTicksLimit:12,font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'} };
const SY={ ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,0.06)'} };
function mkLine(id,labels,datasets,yLabel,opts={}){
  return new Chart(document.getElementById(id),{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#999',boxWidth:10,font:{size:10}}},
        tooltip:{...TT,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(1):'n/a'}`}}
      },
      scales:{
        x:{...SX,...(opts.xTicks||{})},
        y:{...SY,...(yLabel?{title:{display:true,text:yLabel,color:'#555',font:{size:10}}}:{}), ...(opts.yExtra||{})}
      }
    }
  });
}

const D2_REGIONS = [["Vancouver", "#34d399"], ["Toronto", "#f43f5e"], ["Montr\u00e9al", "#60a5fa"], ["Edmonton", "#e879f9"], ["Calgary", "#fbbf24"], ["Ottawa-Gatineau (ON)", "#38bdf8"], ["Canada", "#94a3b8"]];
const SERIES = 'Total (house and land)';
const ALL_DATES = [...new Set(
  D2_REGIONS.flatMap(([r])=>(RAW[r]?.[SERIES]||[]).map(x=>x.date))
)].sort();

const MAPS = {};
D2_REGIONS.forEach(([r])=>{ if(RAW[r]?.[SERIES]) MAPS[r]=toMap(RAW[r][SERIES]); });

function buildStats(){
  const html=D2_REGIONS.map(([r,c])=>{
    const m=MAPS[r]; if(!m) return '';
    const datesWithVal=ALL_DATES.filter(d=>m[d]);
    const last=datesWithVal[datesWithVal.length-1];
    const v=m[last], vm=m[datesWithVal[datesWithVal.length-2]];
    const vy=datesWithVal.length>13?m[datesWithVal[datesWithVal.length-13]]:null;
    const mom=vm?((v-vm)/vm*100).toFixed(1):null;
    const yoyv=vy?((v-vy)/vy*100).toFixed(1):null;
    const peak=Math.max(...datesWithVal.map(d=>m[d]));
    const fromPeak=((v-peak)/peak*100).toFixed(1);
    return `<div class="stat">
      <div class="stat-name"><span class="dot" style="background:${c}"></span>${r}</div>
      <div class="stat-val">${v?.toFixed(1)}</div>
      <div class="stat-sub">Jan 2026 · Peak: ${peak.toFixed(1)}</div>
      ${yoyv!=null?`<div class="stat-yoy ${parseFloat(yoyv)>=0?'pos':'neg'}">${parseFloat(yoyv)>=0?'+':''}${yoyv}% YoY</div>`:''}
      <div class="stat-yoy neg">From peak: ${fromPeak}%</div>
    </div>`;
  }).join('');
  const statsEl = document.getElementById('d2stats');
  if (statsEl) statsEl.innerHTML=html;
}

let mainChart;
function buildMain(start){
  const dates=ALL_DATES.filter(d=>d>=start);
  if(mainChart) mainChart.destroy();
  const datasets=D2_REGIONS.map(([r,c])=>{
    return {
      label:r, data:getVals(MAPS[r]||{},dates),
      borderColor:c, borderWidth:r==='Canada'?2:1.8,
      borderDash:r==='Canada'?[5,3]:[],
      pointRadius:0, fill:false, tension:0.3, spanGaps:false
    };
  });
  mainChart=mkLine('d2main',dates,datasets,'Index (Dec 2016 = 100)');
}

function buildYoY(start){
  const dates=ALL_DATES.filter(d=>d>=start);
  const datasets=D2_REGIONS.map(([r,c])=>{
    return {
      label:r, data:yoy(MAPS[r]||{},dates),
      borderColor:c, borderWidth:1.3,
      pointRadius:0, fill:false, tension:0.3, spanGaps:false,
      hidden: r==='Canada'
    };
  });
  new Chart(document.getElementById('d2yoy'),{
    type:'line', data:{labels:dates,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#999',boxWidth:10,font:{size:10}}},
        tooltip:{...TT,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y!=null?ctx.parsed.y.toFixed(1)+'%':'n/a'}`}}
      },
      scales:{x:SX,y:{...SY,ticks:{...SY.ticks,callback:v=>v+'%'}}}
    }
  });
}

function buildRebased(baseDate){
  const dates=ALL_DATES.filter(d=>d>=baseDate);
  const datasets=D2_REGIONS.filter(([r])=>r!=='Canada').map(([r,c])=>{
    return {
      label:r, data:rebase(MAPS[r]||{},dates,baseDate),
      borderColor:c, borderWidth:1.8,
      pointRadius:0, fill:false, tension:0.3, spanGaps:false
    };
  });
  mkLine('d2rebased',dates,datasets,'Rebased (= 100 at start)');
}

// Peak-to-now bar chart
function buildPeakBar(){
  const items=D2_REGIONS.filter(([r])=>r!=='Canada').map(([r,c])=>{
    const m=MAPS[r]; if(!m) return null;
    const vals=ALL_DATES.filter(d=>m[d]).map(d=>m[d]);
    const peak=Math.max(...vals);
    const latest=vals[vals.length-1];
    const drop=+((latest-peak)/peak*100).toFixed(1);
    return {r,c,drop,atPeak:drop===0};
  }).filter(Boolean);
  new Chart(document.getElementById('d2peak'),{
    type:'bar',
    plugins:[ChartDataLabels],
    data:{
      labels:items.map(x=>x.atPeak?x.r+' ▲ At peak':x.r),
      datasets:[{
        label:'% change from peak',
        data:items.map(x=>x.drop),
        backgroundColor:items.map(x=>x.c+'cc'),
        borderColor:items.map(x=>x.c),
        borderWidth:1,borderRadius:4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{
        legend:{display:false},
        tooltip:{...TT,callbacks:{label:ctx=>` ${ctx.parsed.x.toFixed(1)}%`}},
        datalabels:{
          display:ctx=>items[ctx.dataIndex].atPeak,
          formatter:()=>'0.0%',
          anchor:'end',
          align:'end',
          color:ctx=>items[ctx.dataIndex].c,
          font:{size:11,weight:'bold'}
        }
      },
      scales:{
        x:{...SX,ticks:{...SX.ticks,callback:v=>v+'%'}},
        y:{...SY,ticks:{...SY.ticks,color:'#ccc'}}
      }
    }
  });
}

const appEl = document.getElementById('app');
if (appEl) {
appEl.innerHTML=`
  <div class="stats-grid" id="d2stats"></div>
  <div class="card">
    <h2>Total (House + Land) — Index Comparison</h2>
    <div class="controls">
      <label>Range:</label>
      <button onclick="setR('1981',this)">1981–2026</button>
      <button onclick="setR('2000',this)">2000–2026</button>
      <button class="active" onclick="setR('2010',this)">2010–2026</button>
      <button onclick="setR('2018',this)">2018–2026</button>
    </div>
    <div class="chart-wrap"><canvas id="d2main"></canvas></div>
  </div>
  <div class="grid2">
    <div class="card"><h2>Year-over-Year % Change</h2><div class="chart-sm"><canvas id="d2yoy"></canvas></div></div>
    <div class="card"><h2>Correction from Peak (% drop)</h2><div class="chart-sm"><canvas id="d2peak"></canvas></div></div>
  </div>
  <div class="card">
    <h2>Relative Growth — Rebased to Jan 2010</h2>
    <div class="chart-sm"><canvas id="d2rebased"></canvas></div>
    <p class="annotation">Relative growth since 2010.</p>
  </div>
`;

buildStats();
buildMain('2010');
buildYoY('2010');
buildRebased('2010-01');
buildPeakBar();
}

function setR(y,btn){
  document.querySelectorAll('.controls button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildMain(y+'-01');
}

</script>
</body>
</html>

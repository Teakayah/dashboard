name: CI + auto-merge dev → main

on:
  push:
    branches: [dev]

jobs:
  # ── 1. Run usability tests ──────────────────────────────────────────────────
  test:
    name: Usability tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html + inject og tags
        run: python3 generate_index.py

      - name: Install test dependencies
        run: |
          pip install pytest pytest-playwright playwright
          python -m playwright install --with-deps chromium

      - name: Run usability tests
        run: pytest tests/ -v --tb=short

  # ── 2. Merge dev → main if tests passed ────────────────────────────────────
  auto-merge:
    name: Merge dev → main
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for merge
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev into main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/dev --no-ff -m "chore: auto-merge dev into main"
          git push origin main

name: CI + deploy dev → main

on:
  push:
    branches: [dev]

jobs:
  # ── 1. Usability tests ──────────────────────────────────────────────────────
  test:
    name: Usability tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.1

      - name: Generate index.html + inject og tags
        run: python3 deployment/generate_index.py

      - name: Install test dependencies
        run: |
          pip install pytest pytest-playwright playwright
          python -m playwright install --with-deps chromium

      - name: Run usability tests
        run: pytest tests/ -v --tb=short

  # ── 2. Merge + rebuild index + screenshots ──────────────────────────────────
  deploy:
    name: Merge dev → main + update previews
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev into main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge origin/dev --no-ff -m "chore: auto-merge dev into main [skip ci]"

      - name: Generate index.html + inject og tags
        run: python3 deployment/generate_index.py

      - name: Generate feed.xml
        run: python3 deployment/generate_feed.py

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Screenshot all pages
        run: python3 deployment/screenshot.py

      - name: Commit and push to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html feed.xml previews/ *.html
          git diff --staged --quiet && echo "Nothing new to commit." || \
            git commit -m "chore: update index, feed, previews, og tags [skip ci]"
          git push origin main

  # ── 3. Notify on failure ────────────────────────────────────────────────────
  notify:
    name: Notify on failure
    needs: [test, deploy]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI failed — ${context.sha.slice(0, 7)}`,
              body: [
                `Workflow **${context.workflow}** failed on branch \`${context.ref.replace('refs/heads/', '')}\`.`,
                ``,
                `**Commit:** ${context.sha.slice(0, 7)}`,
                `**[View failed run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})**`
              ].join('\n')
            })

name: Update index.html

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'previews/**'
      - '.github/**'
      - 'output/**'
      - 'source/**'
      - '*.md'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html + inject og:image tags
        run: python3 generate_index.py

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Screenshot all pages → previews/
        run: |
          mkdir -p previews
          python3 -m http.server 8765 &
          SERVER_PID=$!
          sleep 2
          python3 - <<'EOF'
          import os
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          pages = [p.name for p in Path('.').glob('*.html')]

          with sync_playwright() as pw:
              browser = pw.chromium.launch()
              for name in pages:
                  stem = Path(name).stem
                  page = browser.new_page(viewport={'width': 600, 'height': 315})
                  page.goto(f'http://localhost:8765/{name}')
                  try:
                      page.wait_for_load_state('networkidle', timeout=8000)
                  except Exception:
                      pass  # best-effort; some pages load external CDN assets slowly
                  page.screenshot(path=f'previews/{stem}.png')
                  page.close()
                  print(f'  Captured previews/{stem}.png')
              browser.close()
          EOF
          kill $SERVER_PID

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html previews/ *.html
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update index, previews, og tags [skip ci]" && git push

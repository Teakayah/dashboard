name: Update index.html

on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
      - 'previews/**'
      - '.github/**'
      - 'output/**'
      - 'source/**'
      - '*.md'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate index.html + inject og:image tags
        run: python3 generate_index.py

      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Screenshot all pages into previews/
        run: |
          mkdir -p previews
          python3 -m http.server 8765 &
          echo $! > /tmp/server.pid
          sleep 2

          python3 << 'PYEOF'
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          pages = [p.name for p in sorted(Path('.').glob('*.html'))]
          print(f'Screenshotting {len(pages)} page(s): {pages}')

          with sync_playwright() as pw:
              browser = pw.chromium.launch()
              for name in pages:
                  stem = Path(name).stem
                  p = browser.new_page(viewport={'width': 600, 'height': 315})
                  p.goto(f'http://localhost:8765/{name}')
                  try:
                      p.wait_for_load_state('networkidle', timeout=8000)
                  except Exception:
                      pass  # best-effort; CDN assets may be slow
                  p.screenshot(path=f'previews/{stem}.png')
                  p.close()
                  print(f'  Saved previews/{stem}.png')
              browser.close()
          PYEOF

          kill $(cat /tmp/server.pid)

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html previews/ *.html
          git diff --staged --quiet && echo "No changes." || \
            git commit -m "chore: update index, previews, og tags [skip ci]" && git push
